name: CI pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"
        
    - name: Lint with Ruff
      run: |
        ruff check src/ tests/
        
    - name: Test with pytest
      run: |
        pytest tests/ -v
        
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test # Only build Docker if the tests pass
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag cti-mcp-server:latest
