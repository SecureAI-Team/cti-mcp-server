worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # Security: Hide nginx version
    server_tokens off;

    # Basic traffic limits
    client_body_timeout 12s;
    client_header_timeout 12s;
    client_max_body_size 10m;

    upstream mcp_server {
        server cti-mcp:8000;
    }

    server {
        listen 80;
        server_name _;

        # Forward requests to python MCP server
        location / {
            proxy_pass http://mcp_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # -----------------------------------------------------
            # CRITICAL settings for Server-Sent Events (SSE)
            # which FastMCP streamable-http relies on heavily.
            # -----------------------------------------------------
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Prevent timeouts on long-lived SSE connections
            # especially when LLMs are slow to respond or queries take time
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
