worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # Security: Hide nginx version
    server_tokens off;

    # Increase bucket size for long Bearer tokens in map block
    map_hash_bucket_size 128;

    # Rate limiting zone (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

    # Production API Key / Bearer Token definition
    # Replace 'default_token_here' with the same value as MCP_AUTH_TOKEN in .env
    map $http_authorization $is_authorized {
        "Bearer your-secret-mcp-token" 1;
        default 0;
    }

    # Basic traffic limits
    client_body_timeout 12s;
    client_header_timeout 12s;
    client_max_body_size 10m;

    upstream mcp_server {
        server cti-mcp:8000;
    }

    upstream mcp_inspector_ui {
        server inspector:6274;
    }

    upstream mcp_inspector_proxy {
        server inspector:6277;
    }

    server {
        listen 80;
        server_name _;

        # Security Headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # Forward requests to python MCP server
        location / {
            # Apply Rate Limiting (burst 20, nodelay)
            limit_req zone=mcp_limit burst=20 nodelay;

            # CORS Options for browser-based Agent clients
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Simple API Key check for AI Agents
            if ($is_authorized = 0) {
                return 401 '{"error": "Unauthorized", "message": "Missing or invalid API Key in Authorization header"}';
            }

            proxy_pass http://mcp_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # -----------------------------------------------------
            # CRITICAL settings for Server-Sent Events (SSE)
            # which FastMCP streamable-http relies on heavily.
            # -----------------------------------------------------
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Prevent timeouts on long-lived SSE connections
            # especially when LLMs are slow to respond or queries take time
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # -----------------------------------------------------
        # Route 2: MCP Inspector GUI (Port 5173/6274)
        # -----------------------------------------------------
        location /inspector/ {
            proxy_pass http://mcp_inspector_ui/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket support for Vite HMR (if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # -----------------------------------------------------
        # Route 3: MCP Inspector Backend Proxy (Port 6277)
        # -----------------------------------------------------
        location /proxy/ {
            proxy_pass http://mcp_inspector_proxy/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # SSE and WebSocket support for Inspector Proxy
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
