version: '3.8'

services:
  cti-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cti-mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=8000
      - MCP_SERVER_NAME=CTI-Server
      # Threat intel API keys (should be loaded from your local .env if present)
      - OTX_API_KEY=${OTX_API_KEY:-}
      - VT_API_KEY=${VT_API_KEY:-}
    volumes:
      - mitre_cache:/app/.mitre_cache
      - ./logs:/app/logs

volumes:
  mitre_cache:
